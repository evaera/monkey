# Found by searching up from the working directory to the filesystem root

# EDID model substring used to pick the display. `monkey list` shows the names.
model = "MPG"

# What `monkey toggle` flips between.
toggle = ["dp", "usbc"]

# name -> VCP 0x60 value. 15 = DisplayPort is confirmed; the rest are guesses
# until checked with `monkey list`.
[inputs]
dp = 15
usbc = 16
hdmi1 = 17
hdmi2 = 18

# combo -> input, for `monkey listen`. ctrl/alt/shift/cmd plus a key.
# With a KM switch, bind each machine to the other one's input (see README).
[hotkeys]
"ctrl+alt+f10" = "usbc"

# `monkey watch`: follow a USB device (the keyboard on the KM switch) across
# machines. This is the DisplayPort PC: when the keyboard arrives, show this PC;
# when it leaves, hand the monitor to the Mac (USB-C). `monkey usb` lists IDs.
[usb]
device = "3297:1977"
on_connect = "dp"
on_disconnect = "usbc"
# When the keyboard arrives, wake this machine's screen first so the monitor
# finds a live DisplayPort signal and doesn't bounce back to the Mac.
wake_on_connect = true
# wake_settle_ms = 500   # time to let the panel light up before switching
